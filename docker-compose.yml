version: '3.8'

services:
  tts-server:
    build: .
    ports:
      - "5002:5002"
    environment:
      - TTS_MODEL_NAME=tts_models/en/ljspeech/tacotron2-DDC
      - TTS_SERVER_PORT=5002
    volumes:
      - tts-models:/app/tts_models
      - ./multi_tts_api:/app/multi_tts_api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/"]
      interval: 30s
      timeout: 10s
      retries: 3
    
  multi-tts-api:
    build: .
    ports:
      - "8000:8000"
    command: ["python", "/app/multi_tts_api/run_server.py", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - PYTHONPATH=/app
    volumes:
      - tts-models:/app/tts_models
      - ./multi_tts_api:/app/multi_tts_api
    restart: unless-stopped
    depends_on:
      - tts-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  tts-models: